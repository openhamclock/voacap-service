[uwsgi]
plugins = python3

# Socket for nginx to connect to
socket = /run/uwsgi/voacap.sock
chmod-socket = 660
chown-socket = nobody:root
vacuum = true

# Application
chdir = /app
module = voacap_service:application
master = true

# Worker processes — each runs VOACAP independently with no shared state.
# Set to number of CPU cores; each worker handles one VOACAP run at a time.
# Multiple workers = true concurrency.
processes = 4
threads = 1

# Performance tuning
harakiri = 35            ; kill worker if request takes >35s (VOACAP timeout is 30s)
max-requests = 500       ; recycle workers after N requests (prevent memory leaks)
buffer-size = 8192

# Logging
log-master = true
#logto = /dev/stderr
log-date = true

# Stats (optional — bind to expose metrics)
; stats = /run/uwsgi/stats.sock
