worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log /dev/stdout combined;

    # Limit zone only for the expensive map generation
    limit_req_zone $binary_remote_addr zone=voacap_limit:10m rate=2r/s;

    upstream voacap_wsgi {
        server unix:/run/uwsgi/voacap.sock;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;

        # 1. Health Check (Unrestricted)
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # 2. Lightweight: Band Conditions (Unrestricted)
        # Matches /fetchBandConditions and /ham/HamClock/fetchBandConditions.pl
        location ~ ^/(ham/HamClock/)?fetchBandConditions(\.pl)?$ {
            include /etc/nginx/uwsgi_params;
            uwsgi_param HTTP_USER_AGENT $http_user_agent;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 45s;
            uwsgi_send_timeout 10s;
        }

        # 3. Heavy: VOACAP Map/Area Endpoints (Shared Rate Limit)
        # Matches Area, TOA, and MUF variants
        location ~ ^/(ham/HamClock/)?fetchVOACAP(Area|-TOA|-MUF)\.pl$ {
            limit_req zone=voacap_limit burst=10 nodelay;
            limit_req_status 429;
            uwsgi_param HTTP_USER_AGENT $http_user_agent;
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k;
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        # 4. Catch-all Deny
        location / {
            return 404;
        }
    }
}
