worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log /dev/stdout combined;

    # Keep your per-IP rate limit to stop single-user abuse
    limit_req_zone $binary_remote_addr zone=voacap_limit:10m rate=2r/s;

    # NEW: Define a global connection zone. 
    # The key "global_heavy" is shared by everyone.
    # 1m zone is plenty for tracking a single counter.
    limit_conn_zone "global_heavy" zone=global_conns:1m;

    upstream voacap_wsgi {
        server unix:/run/uwsgi/voacap.sock;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;

        # 1. Health Check (Unrestricted)
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # 2. Lightweight: Band Conditions (Unrestricted)
        location ~ ^/(ham/HamClock/)?fetchBandConditions(\.pl)?$ {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 45s;
            uwsgi_send_timeout 10s;
        }

        # 3. Heavy: VOACAP Map/Area Endpoints
        location ~ ^/(ham/HamClock/)?fetchVOACAP(Area|-TOA|-MUF)\.pl$ {
            # Per-IP Rate Limit (Stops one guy from spamming)
            limit_req zone=voacap_limit burst=10 nodelay;
            limit_req_status 429;

            # GLOBAL Connection Limit (Stops server from being overwhelmed)
            # This allows a maximum of 20 concurrent connections across ALL users.
            limit_conn global_conns 20;
            limit_conn_status 429;

            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k;
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        # 4. Catch-all Deny
        location / {
            return 404;
        }
    }
}
