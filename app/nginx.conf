worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log /dev/stdout combined;

    # Upstream uWSGI workers
    upstream voacap_wsgi {
        server unix:/run/uwsgi/voacap.sock;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;

        # Health check endpoint — returns 200 immediately, no VOACAP call
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Band conditions CGI-compatible endpoint
        # Matches HamClock's fetchBandConditions.pl path pattern
        # Timeout chain: subprocess(30s) < nginx(45s) < perl LWP(45s) < lighttpd(60s) < harakiri(300s)
        location /ham/HamClock/fetchBandConditions.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 45s;
            uwsgi_send_timeout 10s;
        }

        # Also accept at /fetchBandConditions for convenience
        location /fetchBandConditions {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 45s;
            uwsgi_send_timeout 10s;
        }

        # VOAAREA native single-frequency coverage map — CSI-compatible path
        # Single VOACAP area run (~5–30s), returns PNG
        location /ham/HamClock/fetchVOACAPArea.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        location /fetchVOACAPArea.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        location /ham/HamClock/fetchVOACAP-TOA.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        location /fetchVOACAP-TOA.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        location /ham/HamClock/fetchVOACAP-MUF.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        location /fetchVOACAP-MUF.pl {
            include /etc/nginx/uwsgi_params;
            uwsgi_pass voacap_wsgi;
            uwsgi_read_timeout 300s;
            uwsgi_send_timeout 300s;
            uwsgi_buffers 16 256k; # 4 MB total, in-memory
            uwsgi_buffer_size 256k;
            uwsgi_busy_buffers_size 512k;
        }

        # Deny everything else
        location / {
            return 404;
        }
    }
}
